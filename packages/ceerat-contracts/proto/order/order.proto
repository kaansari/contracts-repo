syntax = "proto3";

package order;

option go_package = "github.com/kaansari/ceerat-platform/packages/ceerat-contracts/proto/order";

import "proto/customer/customer.proto";
import "proto/service/service.proto";

service OrderManager {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse) {}
  rpc CreateMyOrder(CreateMyOrderRequest) returns (CreateOrderResponse) {}
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse) {}
  rpc GetMyOrder(GetMyOrderRequest) returns (GetOrderResponse) {}
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse) {}
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListOrdersResponse) {}
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse) {}
  rpc AddServiceToOrder(AddServiceToOrderRequest) returns (AddServiceToOrderResponse) {}
  rpc RemoveServiceFromOrder(RemoveServiceFromOrderRequest) returns (RemoveServiceFromOrderResponse) {}
  rpc CheckoutMyCart(CheckoutMyCartRequest) returns (CreateOrderResponse) {}
  rpc CreatePaymentSession(CreatePaymentSessionRequest) returns (PaymentSessionResponse) {}
  rpc GetMyPaymentSession(GetPaymentSessionRequest) returns (PaymentSessionResponse) {}
}

message Order {
  string id = 1;
  string customer_id = 2;
  string user_id = 3;
  string order_number = 4;
  string status = 5;
  string schedule_date = 6;
  string start_date = 7;
  string due_date = 8;
  double subtotal = 9;
  double tax = 10;
  double total = 11;
  string notes = 12;
  customer.Customer customer = 13;
  repeated OrderService services = 14;
  string created_at = 15;
  string updated_at = 16;
  repeated OrderProduct products = 17;
  string payment_status = 18;
}

message OrderProduct {
  string id = 1;
  string order_id = 2;
  string product_id = 3;
  string product_variant_id = 4;
  string product_name = 5;
  string variant_name = 6;
  string sku = 7;
  string model = 8;
  string size = 9;
  string color = 10;
  double unit_price = 11;
  int32 quantity = 12;
  double total_price = 13;
  service.Product product = 14;
  service.ProductVariant product_variant = 15;
  string created_at = 16;
  string updated_at = 17;
}

message OrderService {
  string id = 1;
  string order_id = 2;
  string service_id = 3;
  string service_name = 4;
  string category = 5;
  string type = 6;
  double unit_price = 7;
  int32 quantity = 8;
  double total_price = 9;
  string agent_name = 10;
  string schedule_date = 11;
  string start_date = 12;
  string due_date = 13;
  service.Service service = 14;
  string created_at = 15;
  string updated_at = 16;
}

message CreateOrderRequest {
  string customer_id = 1;
  string user_id = 2;
  string schedule_date = 3;
  string start_date = 4;
  string due_date = 5;
  string notes = 6;
  repeated CreateOrderServiceInput services = 7;
  string status = 8;
}

message CreateOrderServiceInput {
  string service_id = 1;
  int32 quantity = 2;
  string agent_name = 3;
  string schedule_date = 4;
  string start_date = 5;
  string due_date = 6;
}

message CreateOrderResponse {
  Order order = 1;
  repeated Error errors = 2;
}

message CreateMyOrderRequest {
  string schedule_date = 1;
  string start_date = 2;
  string due_date = 3;
  string notes = 4;
  repeated CreateOrderServiceInput services = 5;
  string status = 6;
}

message GetOrderRequest {
  string id = 1;
  string user_id = 2;
}

message GetOrderResponse {
  Order order = 1;
  repeated Error errors = 2;
}

message GetMyOrderRequest {
  string id = 1;
}

message ListOrdersRequest {
  string user_id = 1;
  string customer_id = 2;
  string status = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message ListMyOrdersRequest {
  string status = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message UpdateOrderStatusRequest {
  string id = 1;
  string user_id = 2;
  string status = 3;
}

message UpdateOrderStatusResponse {
  Order order = 1;
  repeated Error errors = 2;
}

message AddServiceToOrderRequest {
  string order_id = 1;
  string user_id = 2;
  CreateOrderServiceInput service = 3;
}

message AddServiceToOrderResponse {
  Order order = 1;
  repeated Error errors = 2;
}

message RemoveServiceFromOrderRequest {
  string order_id = 1;
  string order_service_id = 2;
  string user_id = 3;
}

message RemoveServiceFromOrderResponse {
  Order order = 1;
  repeated Error errors = 2;
}

message CheckoutMyCartRequest {
  string idempotency_key = 1;
  string notes = 2;
}

message PaymentSession {
  string id = 1;
  string order_id = 2;
  string amount_currency = 3;
  double amount = 4;
  string provider = 5;
  string provider_session_id = 6;
  string status = 7;
  string created_at = 8;
  string updated_at = 9;
}

message CreatePaymentSessionRequest {
  string order_id = 1;
  string idempotency_key = 2;
}

message GetPaymentSessionRequest {
  string id = 1;
}

message PaymentSessionResponse {
  PaymentSession payment_session = 1;
  repeated Error errors = 2;
}

message Error {
  int32 code = 1;
  string description = 2;
}
