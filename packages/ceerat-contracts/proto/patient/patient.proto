syntax = "proto3";

package patient;

option go_package = "github.com/kaansari/ceerat-platform/packages/ceerat-contracts/proto/patient";

service patient {
    rpc Create(Patient) returns (PatientResponse) {}
    rpc Get(GetPatientRequest) returns (Patient) {}
    rpc GetAll(GetAllRequest) returns (GetAllResponse) { }
    rpc Auth(Patient) returns (Token) {}
    rpc ValidateToken(Token) returns (Token) {}
}

message Patient {
    string id = 1;
    string fname = 2;
    string lname = 3;
    string dob = 4;
    string dos = 5;
    string location = 6;
    string icdcodes = 7;
    bool covidTest = 8;
    bool covidTestResult = 9;
    bool rsvTest = 10;
    bool rsvTestResult = 11;
    bool strepTest = 12;
    bool strepTestResult = 13;
    bool fluTest = 14;
    bool fluTestResult = 15;

}

message GetAllRequest {}
message GetPatientRequest {
    string id = 1;
}

message GetAllResponse {
   
    repeated Patient patients = 1;
     Error errors = 2;
}

message PatientResponse{

    Patient patient = 1;
    Error errors = 2;
}

message Token {
    string token = 1;
    bool valid = 2;
     Error errors = 3;
}

message Error {
    int32 code = 1;
    string description = 2;
}
