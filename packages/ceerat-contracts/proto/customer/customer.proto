syntax = "proto3";

package customer;

option go_package = "github.com/kaansari/ceerat-platform/packages/ceerat-contracts/proto/customer";

import "proto/auth/auth.proto";

service CustomerService {
  rpc CreateCustomer(CreateCustomerRequest) returns (CustomerResponse) {}
  rpc GetCustomer(GetCustomerRequest) returns (CustomerResponse) {}
  rpc ListCustomers(ListCustomersRequest) returns (ListCustomersResponse) {}
  rpc UpdateCustomer(UpdateCustomerRequest) returns (CustomerResponse) {}
  rpc DeleteCustomer(DeleteCustomerRequest) returns (DeleteCustomerResponse) {}
  rpc AssignCustomerToUser(AssignCustomerToUserRequest) returns (CustomerResponse) {}
}

message Address {
  string line1 = 1;
  string line2 = 2;
  string city = 3;
  string state = 4;
  string country = 5;
  string postal_code = 6;
}

message Customer {
  string id = 1;

  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;

  Address address = 6;

  // Customer is assigned to one user from auth.proto
  string user_id = 7;

  // Optional full user object
  auth.User user = 8;

  string created_at = 9;
  string updated_at = 10;
}

message CreateCustomerRequest {
  Customer customer = 1;

  // Logged-in user creating/owning the customer.
  string user_id = 2;
}

message GetCustomerRequest {
  string id = 1;
}

message ListCustomersRequest {
  string user_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message UpdateCustomerRequest {
  Customer customer = 1;
}

message DeleteCustomerRequest {
  string id = 1;
}

message AssignCustomerToUserRequest {
  string customer_id = 1;
  string user_id = 2;
}

message CustomerResponse {
  Customer customer = 1;
  repeated Error errors = 2;
}

message ListCustomersResponse {
  repeated Customer customers = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message DeleteCustomerResponse {
  bool deleted = 1;
  repeated Error errors = 2;
}

message Error {
  int32 code = 1;
  string description = 2;
}
