syntax = "proto3";

package career;

option go_package = "github.com/kaansari/ceerat-platform/packages/ceerat-contracts/proto/career";

service CareerProfileService {
  rpc CreateSkillProfile(CreateSkillProfileRequest) returns (SkillProfileResponse) {}
  rpc ListMySkillProfiles(ListMySkillProfilesRequest) returns (ListSkillProfilesResponse) {}
  rpc AddSkillToProfile(AddSkillToProfileRequest) returns (SkillProfileResponse) {}
  rpc UpdateSkillInProfile(UpdateSkillInProfileRequest) returns (SkillProfileResponse) {}
  rpc BatchAddSkillsToProfile(BatchAddSkillsToProfileRequest) returns (BatchAddSkillsToProfileResponse) {}
  rpc CreateResume(CreateResumeRequest) returns (ResumeResponse) {}
  rpc ListMyResumes(ListMyResumesRequest) returns (ListResumesResponse) {}
  rpc UpdateResume(UpdateResumeRequest) returns (ResumeResponse) {}
  rpc DeleteResume(DeleteResumeRequest) returns (DeleteResumeResponse) {}
  rpc DownloadResume(DownloadResumeRequest) returns (DownloadResumeResponse) {}
  rpc ParseResumeText(ParseResumeTextRequest) returns (ParseResumeTextResponse) {}
  rpc ImportResumeDraft(ImportResumeDraftRequest) returns (ImportResumeDraftResponse) {}
  rpc CreateEmploymentRecord(CreateEmploymentRecordRequest) returns (EmploymentRecordResponse) {}
  rpc BatchCreateEmploymentRecords(BatchCreateEmploymentRecordsRequest) returns (BatchCreateEmploymentRecordsResponse) {}
  rpc ListMyEmploymentRecords(ListMyEmploymentRecordsRequest) returns (ListEmploymentRecordsResponse) {}
  rpc GetEmploymentRecord(GetEmploymentRecordRequest) returns (EmploymentRecordResponse) {}
  rpc UpdateEmploymentRecord(UpdateEmploymentRecordRequest) returns (EmploymentRecordResponse) {}
  rpc ArchiveEmploymentRecord(ArchiveEmploymentRecordRequest) returns (EmploymentRecordResponse) {}
  rpc AttachEmploymentRecordToResume(AttachEmploymentRecordToResumeRequest) returns (ResumeEmploymentRecordResponse) {}
  rpc BatchAttachEmploymentRecordsToResume(BatchAttachEmploymentRecordsToResumeRequest) returns (BatchAttachEmploymentRecordsToResumeResponse) {}
  rpc DetachEmploymentRecordFromResume(DetachEmploymentRecordFromResumeRequest) returns (ResumeEmploymentRecordResponse) {}
  rpc UpdateResumeEmploymentRecord(UpdateResumeEmploymentRecordRequest) returns (ResumeEmploymentRecordResponse) {}
  rpc ListResumeEmploymentRecords(ListResumeEmploymentRecordsRequest) returns (ListResumeEmploymentRecordsResponse) {}
  rpc GetMyCareerMetrics(GetMyCareerMetricsRequest) returns (CustomerCareerMetricsResponse) {}
}

service JobService {
  rpc CreateCompany(CreateCompanyRequest) returns (CompanyResponse) {}
  rpc ListCompanies(ListCompaniesRequest) returns (ListCompaniesResponse) {}
  rpc GetCompany(GetCompanyRequest) returns (CompanyResponse) {}
  rpc UpdateCompany(UpdateCompanyRequest) returns (CompanyResponse) {}
  rpc CreateJob(CreateJobRequest) returns (JobResponse) {}
  rpc GetJob(GetJobRequest) returns (JobResponse) {}
  rpc SearchJobs(SearchJobsRequest) returns (ListJobsResponse) {}
  rpc UpdateJob(UpdateJobRequest) returns (JobResponse) {}
  rpc CloseJob(CloseJobRequest) returns (JobResponse) {}
  rpc ReopenJob(ReopenJobRequest) returns (JobResponse) {}
  rpc ImportATSJobs(ImportATSJobsRequest) returns (ImportATSJobsResponse) {}
  rpc GetCareerMarketMetrics(GetCareerMarketMetricsRequest) returns (CareerMarketMetricsResponse) {}
}

service JobCartService {
  rpc GetJobCart(GetJobCartRequest) returns (JobCartResponse) {}
  rpc AddJobToCart(AddJobToCartRequest) returns (JobCartResponse) {}
  rpc UpdateCartItemProfile(UpdateCartItemProfileRequest) returns (JobCartResponse) {}
  rpc RemoveJobFromCart(RemoveJobFromCartRequest) returns (JobCartResponse) {}
  rpc ClearJobCart(ClearJobCartRequest) returns (JobCartResponse) {}
}

service JobApplicationService {
  rpc ApplyToJob(ApplyToJobRequest) returns (JobApplicationResponse) {}
  rpc ApplyToCartJobs(ApplyToCartJobsRequest) returns (ListJobApplicationsResponse) {}
  rpc DiscoverJobApplication(DiscoverJobApplicationRequest) returns (DiscoverJobApplicationResponse) {}
  rpc SubmitJobApplication(SubmitJobApplicationRequest) returns (JobApplicationResponse) {}
  rpc ListMyApplications(ListMyApplicationsRequest) returns (ListJobApplicationsResponse) {}
  rpc GetMyApplication(GetMyApplicationRequest) returns (JobApplicationResponse) {}
  rpc ListApplications(ListApplicationsRequest) returns (ListJobApplicationsResponse) {}
  rpc GetApplication(GetApplicationRequest) returns (JobApplicationResponse) {}
  rpc UpdateApplicationStatus(UpdateApplicationStatusRequest) returns (JobApplicationResponse) {}
}

message Company {
  string id = 1;
  string name = 2;
  string website = 3;
  string description = 4;
  string industry = 5;
  string location = 6;
  string source = 7;
  string external_id = 8;
  string source_url = 9;
  string created_at = 10;
  string updated_at = 11;
}

message Job {
  string id = 1;
  string company_id = 2;
  Company company = 3;
  string title = 4;
  string description = 5;
  string location = 6;
  string employment_type = 7;
  string status = 8;
  double salary_min = 9;
  double salary_max = 10;
  string category = 11;
  string remote_type = 12;
  string posted_date = 13;
  string closing_date = 14;
  string source = 15;
  string source_url = 16;
  string external_job_id = 17;
  string created_at = 18;
  string updated_at = 19;
}

message Skill {
  string id = 1;
  string name = 2;
  string category = 3;
  string description = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SkillProfile {
  string id = 1;
  string customer_id = 2;
  string name = 3;
  string summary = 4;
  repeated SkillProfileSkill skills = 5;
  int32 years_of_experience = 6;
  string target_role = 7;
  bool is_default = 8;
  string created_at = 9;
  string updated_at = 10;
}

message SkillProfileSkill {
  string id = 1;
  string skill_profile_id = 2;
  string skill_id = 3;
  Skill skill = 4;
  string level = 5;
  int32 years_experience = 6;
  string created_at = 7;
  string updated_at = 8;
}

message Resume {
  string id = 1;
  string customer_id = 2;
  string skill_profile_id = 3;
  string title = 4;
  string content = 5;
  string file_url = 6;
  string name = 7;
  string content_text = 8;
  int32 version = 9;
  bool is_active = 10;
  string created_at = 11;
  string updated_at = 12;
}

message EmploymentRecord {
  string id = 1;
  string customer_id = 2;
  string company_name = 3;
  string title = 4;
  string location = 5;
  string start_date = 6;
  string end_date = 7;
  bool is_current = 8;
  string summary = 9;
  string employment_type = 10;
  string status = 11;
  string created_at = 12;
  string updated_at = 13;
}

message ResumeEmploymentRecord {
  string id = 1;
  string resume_id = 2;
  string employment_record_id = 3;
  EmploymentRecord employment_record = 4;
  int32 sort_order = 5;
  bool include = 6;
  string tailored_title = 7;
  string tailored_summary = 8;
  string created_at = 9;
  string updated_at = 10;
}

enum ResumeDownloadFormat {
  RESUME_DOWNLOAD_FORMAT_UNSPECIFIED = 0;
  RESUME_DOWNLOAD_FORMAT_PDF = 1;
}

message JobCart {
  string id = 1;
  string customer_id = 2;
  repeated JobCartItem items = 3;
  string status = 4;
  string created_at = 5;
  string updated_at = 6;
}

message JobCartItem {
  string id = 1;
  string job_cart_id = 2;
  string job_id = 3;
  Job job = 4;
  string notes = 5;
  string selected_skill_profile_id = 6;
  string selected_resume_id = 7;
  SkillProfile selected_skill_profile = 8;
  Resume selected_resume = 9;
  string created_at = 10;
  string updated_at = 11;
}

message JobApplication {
  string id = 1;
  string customer_id = 2;
  string job_id = 3;
  Job job = 4;
  string skill_profile_id = 5;
  SkillProfile skill_profile = 6;
  string resume_id = 7;
  Resume resume = 8;
  string status = 9;
  string cover_letter = 10;
  string resume_snapshot_text = 11;
  string created_at = 12;
  string updated_at = 13;
  string provider = 14;
  string provider_submission_id = 15;
  string provider_status = 16;
  string application_url = 17;
}

message CreateSkillProfileRequest {
  string name = 1;
  string summary = 2;
  int32 years_of_experience = 3;
  string target_role = 4;
  bool is_default = 5;
}

message ListMySkillProfilesRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message AddSkillToProfileRequest {
  string skill_profile_id = 1;
  string skill_name = 2;
  string skill_category = 3;
  string level = 4;
  int32 years_experience = 5;
  string skill_description = 6;
}

message UpdateSkillInProfileRequest {
  string skill_profile_id = 1;
  string profile_skill_id = 2;
  string skill_name = 3;
  string skill_category = 4;
  string level = 5;
  int32 years_experience = 6;
  string skill_description = 7;
}

message ResumeDraftSkill {
  string name = 1;
  string category = 2;
  string level = 3;
  int32 years_experience = 4;
  string description = 5;
}

message BatchAddSkillsToProfileRequest {
  string skill_profile_id = 1;
  repeated ResumeDraftSkill skills = 2;
}

message BatchAddSkillsToProfileResponse {
  SkillProfile skill_profile = 1;
  repeated SkillProfileSkill skills = 2;
  repeated Error errors = 3;
}

message CreateResumeRequest {
  string skill_profile_id = 1;
  string title = 2;
  string content = 3;
  string file_url = 4;
  string name = 5;
  string content_text = 6;
  int32 version = 7;
  bool is_active = 8;
}

message ListMyResumesRequest {
  string skill_profile_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message UpdateResumeRequest {
  string id = 1;
  string skill_profile_id = 2;
  string title = 3;
  string content = 4;
  string file_url = 5;
  string name = 6;
  string content_text = 7;
  int32 version = 8;
  bool is_active = 9;
}

message DeleteResumeRequest {
  string id = 1;
}

message DownloadResumeRequest {
  string resume_id = 1;
  ResumeDownloadFormat format = 2;
}

message ParsedResumeEmploymentRecord {
  string company_name = 1;
  string title = 2;
  string location = 3;
  string start_date = 4;
  string end_date = 5;
  bool is_current = 6;
  string summary = 7;
  string employment_type = 8;
  int32 sort_order = 9;
}

message ParsedResume {
  string title = 1;
  string name = 2;
  string content = 3;
  string content_text = 4;
  bool is_active = 5;
}

message ParsedResumeDraft {
  string profile_name = 1;
  string target_role = 2;
  string summary = 3;
  int32 years_of_experience = 4;
  repeated ResumeDraftSkill skills = 5;
  repeated ParsedResumeEmploymentRecord employment_records = 6;
  ParsedResume resume = 7;
}

message ParseResumeTextRequest {
  string file_name = 1;
  string content_type = 2;
  string text = 3;
}

message ParseResumeTextResponse {
  ParsedResumeDraft draft = 1;
  repeated string warnings = 2;
  repeated Error errors = 3;
}

message ResumeImportOptions {
  bool create_skill_profile = 1;
  bool create_resume = 2;
  bool create_employment_records = 3;
  bool attach_employment_records = 4;
}

message ImportResumeDraftRequest {
  ParsedResumeDraft draft = 1;
  ResumeImportOptions options = 2;
}

message ImportResumeDraftResponse {
  SkillProfile skill_profile = 1;
  repeated SkillProfileSkill skills = 2;
  repeated EmploymentRecord employment_records = 3;
  Resume resume = 4;
  repeated ResumeEmploymentRecord resume_employment_records = 5;
  repeated string warnings = 6;
  repeated Error errors = 7;
}

message CreateEmploymentRecordRequest {
  string company_name = 1;
  string title = 2;
  string location = 3;
  string start_date = 4;
  string end_date = 5;
  bool is_current = 6;
  string summary = 7;
  string employment_type = 8;
}

message BatchCreateEmploymentRecordsRequest {
  repeated ParsedResumeEmploymentRecord employment_records = 1;
}

message BatchCreateEmploymentRecordsResponse {
  repeated EmploymentRecord employment_records = 1;
  repeated Error errors = 2;
}

message ListMyEmploymentRecordsRequest {
  string status = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message GetEmploymentRecordRequest {
  string id = 1;
}

message UpdateEmploymentRecordRequest {
  string id = 1;
  string company_name = 2;
  string title = 3;
  string location = 4;
  string start_date = 5;
  string end_date = 6;
  bool is_current = 7;
  string summary = 8;
  string employment_type = 9;
  string status = 10;
}

message ArchiveEmploymentRecordRequest {
  string id = 1;
}

message AttachEmploymentRecordToResumeRequest {
  string resume_id = 1;
  string employment_record_id = 2;
  int32 sort_order = 3;
  bool include = 4;
  string tailored_title = 5;
  string tailored_summary = 6;
}

message ResumeEmploymentRecordInput {
  string employment_record_id = 1;
  int32 sort_order = 2;
  bool include = 3;
  string tailored_title = 4;
  string tailored_summary = 5;
}

message BatchAttachEmploymentRecordsToResumeRequest {
  string resume_id = 1;
  repeated ResumeEmploymentRecordInput attachments = 2;
}

message BatchAttachEmploymentRecordsToResumeResponse {
  repeated ResumeEmploymentRecord resume_employment_records = 1;
  repeated Error errors = 2;
}

message DetachEmploymentRecordFromResumeRequest {
  string resume_id = 1;
  string employment_record_id = 2;
}

message UpdateResumeEmploymentRecordRequest {
  string id = 1;
  int32 sort_order = 2;
  bool include = 3;
  string tailored_title = 4;
  string tailored_summary = 5;
}

message ListResumeEmploymentRecordsRequest {
  string resume_id = 1;
}

message CreateCompanyRequest {
  Company company = 1;
}

message ListCompaniesRequest {
  string query = 1;
  string source = 2;
  int32 page_size = 3;
  string page_token = 4;
}

message GetCompanyRequest {
  string id = 1;
}

message UpdateCompanyRequest {
  Company company = 1;
}

message CreateJobRequest {
  Job job = 1;
}

message GetJobRequest {
  string id = 1;
}

message SearchJobsRequest {
  string query = 1;
  string location = 2;
  string employment_type = 3;
  bool active_only = 4;
  int32 page_size = 5;
  string page_token = 6;
  string company_id = 7;
  string remote_type = 8;
  string status = 9;
  string source = 10;
  string department = 11;
  string seniority = 12;
  repeated string skills = 13;
  string country = 14;
  string sort = 15;
  bool include_facets = 16;
  string company = 17;
}

message JobSearchFacetValue {
  string value = 1;
  string label = 2;
  int32 count = 3;
}

message JobSearchFacet {
  string field = 1;
  string label = 2;
  repeated JobSearchFacetValue values = 3;
}

message UpdateJobRequest {
  Job job = 1;
}

message ATSJob {
  string title = 1;
  string description = 2;
  string location = 3;
  string employment_type = 4;
  string status = 5;
  double salary_min = 6;
  double salary_max = 7;
  string category = 8;
  string remote_type = 9;
  string posted_date = 10;
  string closing_date = 11;
  string source_url = 12;
  string external_job_id = 13;
}

message ImportATSJobsRequest {
  string provider = 1;
  string company_name = 2;
  string external_company_id = 3;
  repeated ATSJob jobs = 4;
}

message ImportATSJobResult {
  string external_job_id = 1;
  string job_id = 2;
  string action = 3;
  repeated string errors = 4;
}

message ImportATSJobsResponse {
  Company company = 1;
  int32 jobs_received = 2;
  int32 jobs_created = 3;
  int32 jobs_updated = 4;
  int32 jobs_skipped = 5;
  repeated ImportATSJobResult results = 6;
}

message MetricBucket {
  string key = 1;
  string label = 2;
  int64 count = 3;
}

message GetCareerMarketMetricsRequest {
}

message CareerMarketMetricsResponse {
  int64 available_jobs = 1;
  int64 company_count = 2;
  int64 job_type_count = 3;
  int64 remote_job_count = 4;
  repeated MetricBucket jobs_by_month = 5;
  repeated MetricBucket jobs_by_type = 6;
  repeated MetricBucket jobs_by_location = 7;
  repeated MetricBucket jobs_by_company = 8;
  repeated MetricBucket jobs_by_source = 9;
  string refreshed_at = 10;
}

message GetMyCareerMetricsRequest {
}

message CustomerCareerMetricsResponse {
  int64 saved_jobs = 1;
  int64 active_resumes = 2;
  int64 skill_profiles = 3;
  int64 applications = 4;
  repeated MetricBucket applications_by_status = 5;
  string refreshed_at = 6;
}

message CloseJobRequest {
  string id = 1;
}

message ReopenJobRequest {
  string id = 1;
}

message GetJobCartRequest {
  string customer_id = 1;
}

message AddJobToCartRequest {
  string customer_id = 1;
  string job_id = 2;
  string notes = 3;
  string selected_skill_profile_id = 4;
  string selected_resume_id = 5;
}

message UpdateCartItemProfileRequest {
  string customer_id = 1;
  string item_id = 2;
  string selected_skill_profile_id = 3;
  string selected_resume_id = 4;
  string notes = 5;
}

message RemoveJobFromCartRequest {
  string customer_id = 1;
  string item_id = 2;
}

message ClearJobCartRequest {
  string customer_id = 1;
}

message ApplyToJobRequest {
  string job_id = 1;
  string skill_profile_id = 2;
  string resume_id = 3;
  string cover_letter = 4;
}

message ApplyToCartJobsRequest {
  string skill_profile_id = 1;
  string resume_id = 2;
  string cover_letter = 3;
}

message DiscoverJobApplicationRequest {
  string job_id = 1;
}

message ApplicationQuestion {
  string key = 1;
  string label = 2;
  string type = 3;
  bool required = 4;
  repeated string options = 5;
  string provider_field_id = 6;
}

message DiscoverJobApplicationResponse {
  string job_id = 1;
  string provider = 2;
  string provider_job_id = 3;
  string application_url = 4;
  repeated ApplicationQuestion questions = 5;
  repeated string required_fields = 6;
  string status = 7;
  repeated Error errors = 8;
}

message ApplicationAnswer {
  string key = 1;
  string value = 2;
}

message SubmitJobApplicationRequest {
  string job_id = 1;
  string skill_profile_id = 2;
  string resume_id = 3;
  string cover_letter = 4;
  repeated ApplicationAnswer answers = 5;
  bool confirmed = 6;
}

message ListMyApplicationsRequest {
  string status = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message GetMyApplicationRequest {
  string id = 1;
}

message ListApplicationsRequest {
  string customer_id = 1;
  string job_id = 2;
  string status = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message GetApplicationRequest {
  string id = 1;
}

message UpdateApplicationStatusRequest {
  string id = 1;
  string status = 2;
}

message CompanyResponse {
  Company company = 1;
  repeated Error errors = 2;
}

message ListCompaniesResponse {
  repeated Company companies = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message JobResponse {
  Job job = 1;
  repeated Error errors = 2;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
  int32 total = 4;
  int32 page = 5;
  int32 page_size = 6;
  repeated JobSearchFacet facets = 7;
}

message SkillProfileResponse {
  SkillProfile skill_profile = 1;
  repeated Error errors = 2;
}

message ListSkillProfilesResponse {
  repeated SkillProfile skill_profiles = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message ResumeResponse {
  Resume resume = 1;
  repeated Error errors = 2;
}

message ListResumesResponse {
  repeated Resume resumes = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message DeleteResumeResponse {
  string id = 1;
  bool deleted = 2;
  repeated Error errors = 3;
}

message DownloadResumeResponse {
  bytes file = 1;
  string file_name = 2;
  string content_type = 3;
  ResumeDownloadFormat format = 4;
  string resume_id = 5;
  repeated Error errors = 6;
}

message EmploymentRecordResponse {
  EmploymentRecord employment_record = 1;
  repeated Error errors = 2;
}

message ListEmploymentRecordsResponse {
  repeated EmploymentRecord employment_records = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message ResumeEmploymentRecordResponse {
  ResumeEmploymentRecord resume_employment_record = 1;
  repeated Error errors = 2;
}

message ListResumeEmploymentRecordsResponse {
  repeated ResumeEmploymentRecord resume_employment_records = 1;
  repeated Error errors = 2;
}

message JobCartResponse {
  JobCart cart = 1;
  repeated Error errors = 2;
}

message JobApplicationResponse {
  JobApplication application = 1;
  repeated Error errors = 2;
}

message ListJobApplicationsResponse {
  repeated JobApplication applications = 1;
  string next_page_token = 2;
  repeated Error errors = 3;
}

message Error {
  int32 code = 1;
  string description = 2;
}
